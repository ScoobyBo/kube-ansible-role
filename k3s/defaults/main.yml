---
# defaults file for k3s
k3s_version: "v1.31.4+k3s1"

k3s_write_kubeconfig_mode: "0640"

k3s_kubeconfig_local_path: "./kubeconfig"

k3s_install_dir: /usr/local/bin

k3s_config_dir: /etc/rancher/k3s

k3s_systemd_dir: /etc/systemd/system

k3s_api_endpoint: "{{ hostvars[groups['masters'][0]].ansible_host }}"

k3s_server_binary_url: >-
  https://github.com/k3s-io/k3s/releases/download/{{ k3s_version }}/k3s

k3s_checksum_url: >-
  https://github.com/k3s-io/k3s/releases/download/{{ k3s_version }}/sha256sum-amd64.txt

k3s_tls_san:
  - "{{ k3s_api_endpoint }}"

k3s_disable:
  - traefik
  - servicelb


k3s_manage_ufw: true


k3s_ufw_rules:
  - { port: "6443", proto: "tcp" }
  - { port: "10250", proto: "tcp" }
  - { port: "8472", proto: "udp" }
  - { port: "2379:2380", proto: "tcp" }  




