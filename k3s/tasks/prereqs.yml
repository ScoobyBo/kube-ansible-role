---
- name: disable swap
  command: swapoff -a
  changed_when: false

- name: remove swap fstab
  replace:
    path: /etc/fstab
    regexp: '^([^#].*?\sswap\s+sw\s+.*)$'
    replace: '# \1'

- name: load kernel modules
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - br_netfilter
    - overlay

- name: configure sysctl
  copy:
    dest: /etc/sysctl.d/99-kubernetes.conf
    content: |
      net.bridge.bridge-nf-call-iptables=1
      net.ipv4.ip_forward=1
      net.bridge.bridge-nf-call-ip6tables=1
  notify:
    - restart k3s

- name: apply sysctl
  command: sysctl --system
  changed_when: false

- name: gather service facts
  service_facts:

- name: install ufw
  apt:
    name: ufw
    state: present
    update_cache: true
  when: k3s_manage_ufw | bool

- name: allow ssh
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
  when: k3s_manage_ufw | bool

- name: allow k3s ports
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
  loop: "{{ k3s_ufw_rules }}"
  when: k3s_manage_ufw | bool

- name: enable ufw
  community.general.ufw:
    state: enabled
  when: k3s_manage_ufw | bool

- name: create k3s config dir
  file:
    path: "{{ k3s_config_dir }}"
    state: directory
    mode: '0755'