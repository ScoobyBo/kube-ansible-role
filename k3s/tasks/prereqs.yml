---
- name: disable swap
  command: swapoff -a
  changed_when: false

- name: remove swap fstab
  replace:
    path: /etc/fstab
    regexp: '^([^#].*?\sswap\s+sw\s+.*)$'
    replace: '# \1'

- name: load kernel modules
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - br_netfilter
    - overlay

- name: configure sysctl
  copy:
    dest: /etc/sysctl.d/99-kubernetes.conf
    content: |
      net.bridge.bridge-nf-call-iptables=1
      net.ipv4.ip_forward=1
      net.bridge.bridge-nf-call-ip6tables=1
  notify:
    - restart k3s

- name: apply sysctl
  command: sysctl --system
  changed_when: false

- name: gather service facts
  service_facts:

- name: disable firewalld
  service:
    name: firewalld
    state: stopped
    enabled: false
  when:
    - k3s_disable_firewalld | default(false)
    - "'firewalld.service' in ansible_facts.services"

- name: create k3s config dir
  file:
    path: "{{ k3s_config_dir }}"
    state: directory
    mode: '0755'