all:
  vars:
    ansible_user: vladislav
    ansible_become: true

    k3s_version: "v1.31.4+k3s1"

    k3s_api_endpoint: "192.168.56.5"

    k3s_disable:
      - traefik
      - servicelb

  children:

    masters:
      hosts:

        master-1:
          ansible_host: 192.168.56.5

          k3s_node_labels:
            - "node-role.kubernetes.io/control-plane=true"

    workers:
      hosts:

        worker-1:
          ansible_host: 192.168.56.6

        worker-2:
          ansible_host: 192.168.56.7          


    k3s_cluster:
      children:
        masters:
        workers:




        